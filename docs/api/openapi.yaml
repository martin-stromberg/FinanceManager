openapi: 3.0.3
info:
  title: FinanceManager API
  version: 1.0.0
  description: OpenAPI specification (partial) for FinanceManager — Accounts endpoints and models.
servers:
  - url: https://api.example.com
    description: Production server (example)
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: FinanceManager.Auth
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    AccountDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        ownerUserId:
          type: string
          format: uuid
        type:
          type: integer
        name:
          type: string
        iban:
          type: string
          nullable: true
        currentBalance:
          type: number
          format: decimal
        bankContactId:
          type: string
          format: uuid
        symbolAttachmentId:
          type: string
          format: uuid
          nullable: true
        savingsPlanExpectation:
          type: integer
        securityProcessingEnabled:
          type: boolean
        createdUtc:
          type: string
          format: date-time
        modifiedUtc:
          type: string
          format: date-time
          nullable: true
      required: [id, ownerUserId, type, name, bankContactId, currentBalance, savingsPlanExpectation, securityProcessingEnabled, createdUtc]
    AccountCreateRequest:
      type: object
      properties:
        name:
          type: string
        type:
          type: integer
        iban:
          type: string
          nullable: true
        bankContactId:
          type: string
          format: uuid
          nullable: true
        newBankContactName:
          type: string
          nullable: true
        symbolAttachmentId:
          type: string
          format: uuid
          nullable: true
        savingsPlanExpectation:
          type: integer
          nullable: true
        securityProcessingEnabled:
          type: boolean
          nullable: true
      required: [name, type]
    AccountUpdateRequest:
      type: object
      properties:
        name:
          type: string
        iban:
          type: string
          nullable: true
        bankContactId:
          type: string
          format: uuid
          nullable: true
        newBankContactName:
          type: string
          nullable: true
        symbolAttachmentId:
          type: string
          format: uuid
          nullable: true
        savingsPlanExpectation:
          type: integer
          nullable: true
        securityProcessingEnabled:
          type: boolean
          nullable: true
      required: [name]
  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
    Problem:
      description: ProblemDetails
      content:
        application/json:
          schema:
            type: object
            properties:
              type:
                type: string
              title:
                type: string
              status:
                type: integer
              detail:
                type: string
              traceId:
                type: string
paths:
  /api/accounts:
    get:
      summary: List accounts for current user
      security:
        - cookieAuth: []
      parameters:
        - name: skip
          in: query
          schema:
            type: integer
            default: 0
        - name: take
          in: query
          schema:
            type: integer
            default: 100
        - name: bankContactId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccountDto'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/accounts:
    post:
      summary: Create a new account
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountCreateRequest'
      responses:
        '201':
          description: Created account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountDto'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/responses/Problem'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/accounts/{id}:
    get:
      summary: Get account by id
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountDto'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      summary: Update account
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountUpdateRequest'
      responses:
        '200':
          description: Updated account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountDto'
        '400':
          description: Validation error
        '404':
          $ref: '#/components/responses/NotFound'
  /api/accounts/{id}:
    delete:
      summary: Delete account
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: No Content
        '404':
          $ref: '#/components/responses/NotFound'
  /api/accounts/{id}/symbol/{attachmentId}:
    post:
      summary: Assign an attachment as symbol
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: attachmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: No Content
        '404':
          $ref: '#/components/responses/NotFound'
  /api/accounts/{id}/symbol:
    delete:
      summary: Clear account symbol
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: No Content
        '404':
          $ref: '#/components/responses/NotFound'
security:
  - cookieAuth: []
