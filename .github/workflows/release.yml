name: Release

on:
  push:
    branches: [master]
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install release dependencies
        run: npm ci

      - name: Resolve release version
        id: version
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/resolve-release-version.mjs

      - name: Check out release tag for asset repair
        if: steps.version.outputs.released == 'true' && steps.version.outputs.release_action == 'upload-existing'
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          git checkout --detach "$env:RELEASE_TAG"
          if ($LASTEXITCODE -ne 0) {
            throw "Could not check out release tag '$env:RELEASE_TAG'."
          }

          $expectedCommit = git rev-parse "$env:RELEASE_TAG^{commit}"
          if ($LASTEXITCODE -ne 0) {
            throw "Could not resolve release tag '$env:RELEASE_TAG' to a commit."
          }

          $checkedOutCommit = git rev-parse HEAD
          if ($LASTEXITCODE -ne 0 -or $checkedOutCommit -ne $expectedCommit) {
            throw "Release tag checkout did not resolve to the tagged commit."
          }

      - name: Restore solution
        if: steps.version.outputs.released == 'true'
        run: dotnet restore FinanceManager.sln

      - name: Test release gate
        if: steps.version.outputs.released == 'true'
        run: |
          dotnet test FinanceManager.Tests/FinanceManager.Tests.csproj --configuration Release --no-restore
          dotnet test FinanceManager.Tests.Integration/FinanceManager.Tests.Integration.csproj --configuration Release --no-restore

      - name: Build solution
        if: steps.version.outputs.released == 'true'
        run: dotnet build FinanceManager.sln --configuration Release --no-restore

      - name: Publish application
        if: steps.version.outputs.released == 'true'
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_REPOSITORY: ${{ github.repository }}
          RELEASE_COMMIT: ${{ github.sha }}
        run: |
          if (Test-Path publish) {
            Remove-Item -Recurse -Force publish
          }

          foreach ($runtime in @("win-x64", "linux-x64")) {
            $output = Join-Path "publish" $runtime
            dotnet publish FinanceManager.Web/FinanceManager.Web.csproj --configuration Release --framework net10.0 --runtime $runtime --self-contained true --output $output
            if ($LASTEXITCODE -ne 0) {
              throw "Publish failed for $runtime."
            }

            $metadata = @{
              version = $env:RELEASE_VERSION
              publishedAt = (Get-Date).ToUniversalTime().ToString("O")
              commitSha = $env:RELEASE_COMMIT
              repository = $env:RELEASE_REPOSITORY
              runtimeIdentifier = $runtime
            } | ConvertTo-Json
            Set-Content -LiteralPath (Join-Path $output "release-metadata.json") -Value $metadata -Encoding UTF8
          }

          if (-not (Test-Path publish -PathType Container)) {
            throw "The publish directory was not created."
          }

      - name: Package publish output
        id: package
        if: steps.version.outputs.released == 'true'
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:RELEASE_VERSION)) {
            throw "The release version is missing."
          }

          $assetPaths = New-Object System.Collections.Generic.List[string]

          foreach ($runtime in @("win-x64", "linux-x64")) {
            $publishPath = (Resolve-Path (Join-Path "publish" $runtime)).Path
            $publishedFiles = Get-ChildItem -LiteralPath $publishPath -File -Recurse -Force
            if ($publishedFiles.Count -eq 0) {
              throw "The publish directory for $runtime is empty."
            }

            $archivePath = Join-Path $PWD "FinanceManager-v$env:RELEASE_VERSION-$runtime.zip"
            if (Test-Path -LiteralPath $archivePath) {
              Remove-Item -Force -LiteralPath $archivePath
            }

            Add-Type -AssemblyName System.IO.Compression.FileSystem
            [System.IO.Compression.ZipFile]::CreateFromDirectory(
              $publishPath,
              $archivePath,
              [System.IO.Compression.CompressionLevel]::Optimal,
              $false
            )

            $archive = [System.IO.Compression.ZipFile]::OpenRead($archivePath)
            try {
              if ($archive.Entries.Count -eq 0) {
                throw "The release archive for $runtime is empty."
              }
            }
            finally {
              $archive.Dispose()
            }

            $assetPaths.Add([System.IO.Path]::GetFileName($archivePath))
          }

          "asset_paths=$($assetPaths -join ';')" | Add-Content -Path $env:GITHUB_OUTPUT

      - name: Generate release notes for update manifest
        id: notes
        if: steps.version.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          $json = gh api repos/${{ github.repository }}/releases/generate-notes -f tag_name="$env:RELEASE_TAG"
          $notes = ($json | ConvertFrom-Json).body
          $notesPath = Join-Path $PWD "release-notes.md"
          Set-Content -LiteralPath $notesPath -Value $notes -Encoding UTF8
          "notes_path=release-notes.md" | Add-Content -Path $env:GITHUB_OUTPUT

      - name: Generate update manifest
        id: manifest
        if: steps.version.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_NOTES_PATH: ${{ steps.notes.outputs.notes_path }}
        run: |
          $publishedAt = ""
          try {
            $releaseJson = gh release view "$env:RELEASE_TAG" --json publishedAt 2>$null
            if ($LASTEXITCODE -eq 0 -and -not [string]::IsNullOrWhiteSpace($releaseJson)) {
              $publishedAt = ($releaseJson | ConvertFrom-Json).publishedAt
            }
          }
          catch {
            $publishedAt = ""
          }

          if ([string]::IsNullOrWhiteSpace($publishedAt)) {
            $publishedAt = (Get-Date).ToUniversalTime().ToString("O")
          }

          $env:RELEASE_PUBLISHED_AT = $publishedAt
          $env:RELEASE_NOTES = Get-Content -Raw -LiteralPath $env:RELEASE_NOTES_PATH
          node scripts/generate-update-manifest.mjs
          if (-not (Test-Path -LiteralPath "update.json")) {
            throw "update.json was not generated."
          }
          "manifest_path=update.json" | Add-Content -Path $env:GITHUB_OUTPUT

      - name: Create automatic GitHub release
        if: steps.version.outputs.released == 'true' && steps.version.outputs.release_action == 'create' && steps.version.outputs.release_kind == 'automatic'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_ASSET_PATHS: ${{ steps.package.outputs.asset_paths }}
          RELEASE_MANIFEST_PATH: ${{ steps.manifest.outputs.manifest_path }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: npm run release

      - name: Create manual-tag GitHub release
        if: steps.version.outputs.released == 'true' && steps.version.outputs.release_action == 'create' && steps.version.outputs.release_kind == 'manual'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ASSET_PATHS: ${{ steps.package.outputs.asset_paths }}
          RELEASE_MANIFEST_PATH: ${{ steps.manifest.outputs.manifest_path }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          $assets = @($env:RELEASE_ASSET_PATHS -split ';') + @($env:RELEASE_MANIFEST_PATH)
          gh release create "$env:RELEASE_TAG" @assets --title "$env:RELEASE_TAG" --notes-file "${{ steps.notes.outputs.notes_path }}" --verify-tag

      - name: Upload asset to existing GitHub release
        if: steps.version.outputs.released == 'true' && steps.version.outputs.release_action == 'upload-existing'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ASSET_PATHS: ${{ steps.package.outputs.asset_paths }}
          RELEASE_MANIFEST_PATH: ${{ steps.manifest.outputs.manifest_path }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          $assets = @($env:RELEASE_ASSET_PATHS -split ';') + @($env:RELEASE_MANIFEST_PATH)
          gh release upload "$env:RELEASE_TAG" @assets --clobber
